<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
            body {
            font-family: 'Trebuchet MS', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 20px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            color: #1a1a1a;
            font-weight: bold;
        }

        /* Container für jeden Film */
        article {
            background-color: #ffffff;
            border-radius: 12px;
            margin: 20px auto;
            padding: 25px;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        article:hover {
            transform: scale(1.01);
        }

        /* Filmplakat */
        img {
            max-width: 200px;
            border-radius: 8px;
            float: left;
            /* Text umfließt das Bild */
            margin-right: 20px;
            margin-bottom: 10px;
        }

        /* Überschriften der Filme */
        h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        /* Genre-Tags Styling */
        .genre {
            display: inline-block;
            background-color: #e1ecf4;
            color: #39739d;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-right: 8px;
            border: 1px solid #7aa7c7;
        }

        /* Hilfsklasse zum Aufheben des Floats (damit Container nicht kollabieren) */
        article::after {
            content: "";
            display: table;
            clear: both;
        }
    </style>
    <script>
    window.onload = function () {
        const xhr = new XMLHttpRequest();
        
        xhr.onload = function () {
            const bodyElement = document.querySelector("body");
            
            if (xhr.status == 200) {
                // JSON-Text vom Server in ein JavaScript-Objekt umwandeln
                const movies = JSON.parse(xhr.responseText);

                // Seite initialisieren
                bodyElement.innerHTML = "<h1>Meine Filmbibliothek</h1>";

                // Über das Array iterieren
                movies.forEach(movie => {
                    const article = document.createElement("article");

                    // Titel
                    const title = document.createElement("h2");
                    title.textContent = movie.Title;
                    article.appendChild(title);

                    // Poster
                    const img = document.createElement("img");
                    img.src = movie.Poster;
                    img.alt = `Poster für ${movie.Title}`;
                    article.appendChild(img);

                    // Metadaten
                    const info = document.createElement("p");
                    info.innerHTML = `<strong>Veröffentlicht:</strong> ${movie.Released} | 
                                      <strong>Dauer:</strong> ${movie.Runtime} min | 
                                      <strong>IMDb Rating:</strong> ${movie.imdbRating}`;
                    article.appendChild(info);

                    // Plot
                    const plot = document.createElement("p");
                    plot.textContent = movie.Plot;
                    article.appendChild(plot);

                    // Genres
                    const genrePara = document.createElement("p");
                    movie.Genres.forEach(genre => {
                        const span = document.createElement("span");
                        span.classList.add("genre");
                        span.textContent = genre;
                        genrePara.appendChild(span);
                    });
                    article.appendChild(genrePara);

                    // Artikel in den Body einfügen
                    bodyElement.appendChild(article);
                });
            } else {
                bodyElement.innerHTML = "<h1>Fehler</h1><p>Daten konnten nicht geladen werden, Status " + xhr.status + "</p>";
            }
        };

        xhr.open("GET", "/movies");
        xhr.send();
    }
</script>

</head>

<body>
</body>

</html>
